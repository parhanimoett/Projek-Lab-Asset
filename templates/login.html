<!DOCTYPE html><html><head><title>Login - LAB-ASSET</title><link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}"></head>
<body class="login-container">
    <div class="login-box">
        <h2>LAB-ASSET</h2><p style="text-align: center; color: #7f8c8d; margin-bottom: 30px;">Sistem Manajemen Inventaris</p>
        {% with messages = get_flashed_messages() %}{% if messages %}<p style="color: red; text-align: center; font-weight: bold;">{{ messages[0] }}</p>{% endif %}{% endwith %}
        <form method="POST" action="/login_auth">
            <label><b>Username</b></label><input type="text" name="username" placeholder="Masukkan username" required>
            <label><b>Password</b></label><input type="password" name="password" placeholder="Masukkan password" required>
            <button type="submit" class="btn btn-primary">Login</button>
        </form>
    </div>
</body></html>
